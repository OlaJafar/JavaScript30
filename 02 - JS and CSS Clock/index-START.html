<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS + CSS Clock</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>


    <div class="clock">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
      </div>
    </div>


  <style>
    html {
      background: #018DED url(https://unsplash.it/1500/1000?image=881&blur=5);
      background-size: cover;
      font-family: 'helvetica neue','sans-serif';
      text-align: center;
      font-size: 10px;
    }

    body {
      margin: 0;
      font-size: 2rem;
      display: flex;
      flex: 1;
      min-height: 100vh;
      align-items: center;
    }

    .clock {
      width: 30rem;
      height: 30rem;
      border: 20px solid white;
      border-radius: 50%;
      margin: 50px auto;
      position: relative;
      padding: 2rem;
      box-shadow:
        0 0 0 4px rgba(0,0,0,0.1),
        inset 0 0 0 3px #EFEFEF,
        inset 0 0 10px black,
        0 0 10px rgba(0,0,0,0.2);
    }

    .clock-face {
      position: relative;
      width: 100%;
      height: 100%;
      transform: translateY(-3px); /* account for the height of the clock hands */

    }

    .hand {
      width: 50%;
      height: 6px;
      background: black;
      position: absolute;
      top: 50%;
      transform-origin: 100%;
      transition: all 0.5s ease-in-out ;
         transition-timing-function: cubic-bezier(0, 1.26, 0.6, 0.96);
         right:50%;
         transform: rotate(90deg);
    }
    .hour-hand{
      width:30%;
    }
   

  </style>

  <script>
    const secondHand=document.querySelector('.second-hand');
    const minHand=document.querySelector('.min-hand');
    const hourHand=document.querySelector('.hour-hand');
    function updateDate(){
      const now=new Date();
      const seconds=now.getSeconds();
      const secondsDegree=seconds*360/60 +90;
         if (seconds === 0) {
              secondHand.style.transition = 'none';
         } else {
              secondHand.style.transition = 'all 0.5s ease-in-out';
         }
      secondHand.style.transform=`rotate(${secondsDegree}deg)`;
      
      
      const min=now.getMinutes();
      const minDegree=min*360/60 +90;
      minHand.style.transform=`rotate(${minDegree}deg)`;
      
      
      const hours=now.getHours();
      const hoursDegree=hours*360/12 +90;
      hourHand.style.transform=`rotate(${hoursDegree}deg)`;
      
      
    }
    setInterval(updateDate,1000);


  </script>
</body>
</html>
