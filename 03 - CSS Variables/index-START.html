<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input class="changed" id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input class="changed" id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input class="changed" id="base" type="color" name="base" value="#ffc600" data-sizing="">
  </div>

  <img src="https://images.stockcake.com/public/e/8/a/e8a35ae1-6e9d-4f09-bca6-155dd66c4cfb_large/sunset-city-skyline-stockcake.jpg">

  <style>
     :root{
          --base:#ffc600;
          --blur:10px;
          --spacing:10px;
     }
     img{
          background-color: var(--base);
          filter: blur(var(--blur));
          padding: var(--spacing);
     }
     span{
          color:var(--base);
     }
    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: #193549;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 50px;
    }

    .controls {
      margin-bottom: 50px;
    }

    input {
      width: 100px;
    }
  </style>

  <script>
       const controls=document.querySelector('.controls');
       controls.addEventListener('change',function(e){
          if(!e.target.classList.contains('changed'))return;
          const property=`--${e.target.name}`;
          const value=e.target.value+e.target.dataset.sizing;
          document.documentElement.style.setProperty(property,value);
       })
  </script>

</body>
</html>
